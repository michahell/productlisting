<h2 class="${hlmH2} mb-5">wishlist</h2>

<div class="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4 pl-4 pr-4">
  @for (wishlistItem of wishlistItems(); track $index; let index = $index) {
    <app-product
      [product]="wishlistItem"
      [canBeWishlisted]="false"
      [style.--delay]="index"
      class="flex mb-5"
      animate.enter="fade-slide-in"
      animate.leave="fade-slide-out"
    ></app-product>
  } @empty {
    <div hlmItem variant="muted">
      <div hlmItemContent>
        <div hlmItemTitle>Muted Variant</div>
        <p hlmItemDescription>Subdued appearance with muted colors for secondary content.</p>
      </div>
      <div hlmItemActions>
        <button hlmBtn variant="outline" size="sm">Open</button>
      </div>
    </div>
  }
</div>
