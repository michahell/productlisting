<h2 class="${hlmH2} mb-5">reproductions</h2>

<div class="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4 pl-4 pr-4">
  @for (product of products(); track $index; let index = $index) {
    <app-product
      (favourited)="onProductFavourited($event)"
      [product]="product"
      [style.--delay]="index"
      class="flex mb-5"
      animate.enter="fade-slide-in"
      animate.leave="fade-slide-out"
    ></app-product>
  }
</div>
